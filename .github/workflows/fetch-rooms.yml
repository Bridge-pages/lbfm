name: Fetch Live Rooms

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Chaturbate API (pinay + filipina tags)
        run: |
          curl -s "https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=request_ip&tag=pinay" \
            --fail --max-time 15 -o pinay.json
          curl -s "https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=request_ip&tag=filipina" \
            --fail --max-time 15 -o filipina.json

          node -e "
            const fs = require('fs');
            const a = JSON.parse(fs.readFileSync('pinay.json')).results || [];
            const b = JSON.parse(fs.readFileSync('filipina.json')).results || [];
            const seen = new Set();
            const merged = [...a, ...b].filter(r => {
              if (seen.has(r.username)) return false;
              seen.add(r.username);
              return true;
            });
            fs.writeFileSync('rooms.json', JSON.stringify({ count: merged.length, results: merged }));
            console.log('Saved', merged.length, 'rooms');
          "

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rooms.json
          git diff --cached --quiet || git commit -m "chore: update rooms.json"
          git push
