<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Live Asian, Pinay, Filipina & Thai Cams from Chaturbate and BongaCams">
    <title>Asian LIVE</title>
    <style>
        :root {
            --bg: #190b14;
            --bg2: #241422;
            --bg3: #331c2f;
            --border: #4e253b;
            --border2: #662e4b;
            --text: #eefbff;
            --text-muted: #d5617b;
            --accent: #e52b50;
            --live: #e7829a;
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            line-height: 1.5;
            font-size: 14px;
        }
        a { color: #ea5170; text-decoration: none; }
        a:hover { color: #f7bfcb; }

        #navbar {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
            text-shadow: 0 0 8px #e52b50;
        }
        .lbfm-btn {
            background: #4a1f3a;
            color: #ff99cc;
            padding: 7px 16px;
            border-radius: 5px;
            font-weight: 600;
            margin-left: auto;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 16px; }

        #seo-hero { padding: 24px 0 16px; border-bottom: 1px solid var(--border); }
        #seo-h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }

        .controls-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }
        .controls-bar input {
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 4px;
            width: 300px;
        }
        .refresh-btn {
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }

        .table-wrap { overflow-x: auto; margin-top: 10px; }
        #rooms-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        #rooms-table th {
            background: var(--bg2);
            padding: 12px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        #rooms-table th:hover { color: var(--accent); }
        #rooms-table th.sort-asc::after { content: " ▲"; color: var(--accent); }
        #rooms-table th.sort-desc::after { content: " ▼"; color: var(--accent); }

        #rooms-table td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--border);
        }
        #rooms-table tr:hover { background: #392035; }

        .badge-live {
            background: rgba(231,130,154,0.14);
            color: var(--live);
            border: 1px solid rgba(231,130,154,0.4);
            padding: 3px 9px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .viewers-val { color: var(--live); font-weight: 600; }

        #pagination {
            display: flex;
            gap: 8px;
            padding: 25px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        #pagination button {
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text-muted);
            padding: 7px 13px;
            border-radius: 4px;
            cursor: pointer;
            min-width: 38px;
        }
        #pagination button.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent2);
        }

        footer {
            text-align: center;
            padding: 50px 20px 30px;
            color: #666;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

    <div id="navbar">
        <span class="site-title">● ASIAN LIVE</span>
        <a href="https://fhg.camdough.com/" target="_blank" class="lbfm-btn">LBFM Original Site</a>
        <span class="live-count">Online: <span id="total-count">—</span></span>
    </div>

    <div class="container">
        <div id="seo-hero">
            <h1 id="seo-h1">Asian, Pinay &amp; Filipina Live Cams — <span id="seo-count">0</span> Online Now</h1>
        </div>

        <div class="controls-bar">
            <input type="text" id="search-input" placeholder="Search username, country or tag..." onkeyup="applyFilters()">
            <button class="refresh-btn" onclick="fetchAllRooms()">↻ Refresh</button>
        </div>

        <div class="table-wrap">
            <table id="rooms-table">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Username</th>
                        <th onclick="sortTable(1)">Status</th>
                        <th onclick="sortTable(2)" class="num">Viewers</th>
                        <th onclick="sortTable(3)">Country</th>
                        <th onclick="sortTable(4)">Tags</th>
                        <th onclick="sortTable(5)">Source</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="rooms-body"></tbody>
            </table>
        </div>

        <div id="pagination"></div>
    </div>

    <footer>
        <p>All models are 18+. Shows both Chaturbate and BongaCams. Auto-refreshes every 4 minutes.</p>
    </footer>

    <script>
        let allRooms = [];
        let filteredRooms = [];
        let currentPage = 1;
        const perPage = 50;
        let sortColumn = 2;
        let sortDirection = -1;

        const WM = "T2CSW";

        async function fetchAllRooms() {
            const tbody = document.getElementById('rooms-body');
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:60px;color:#d5617b;">Loading cams from Chaturbate & BongaCams...</td></tr>`;

            let rooms = [];

            // Chaturbate (prioritized)
            const cbUrls = [
                `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=100&tag=pinay&gender=f`,
                `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=80&tag=filipina&gender=f`,
                `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=100&tag=asian&gender=f`,
                `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=60&tag=thai&gender=f`
            ];

            for (let url of cbUrls) {
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.rooms) {
                        rooms = rooms.concat(data.rooms.map(r => ({
                            username: r.username || "Unknown",
                            viewers: parseInt(r.num_users) || 0,
                            country: r.location || "Asia",
                            tags: (r.tags || ["Asian"]).join(", "),
                            source: "Chaturbate",
                            url: `https://chaturbate.com/${r.username}/?tour=bbrB&campaign=${WM}`
                        })));
                    }
                } catch(e) {}
            }

            // BongaCams
            try {
                const res = await fetch('https://bngprm.com/promo.php?c=18144&type=api&api_v=1&limit=30&api_type=json');
                const data = await res.json();
                if (Array.isArray(data)) {
                    rooms = rooms.concat(data.map(r => ({
                        username: r.username || "Unknown",
                        viewers: parseInt(r.viewers) || 0,
                        country: r.homecountry || "Asia",
                        tags: "Asian",
                        source: "BongaCams",
                        url: r.chat_url || `https://bongacams.com/${r.username}`
                    })));
                }
            } catch(e) {}

            allRooms = rooms;
            filteredRooms = [...allRooms];
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('rooms-body');
            tbody.innerHTML = '';

            const start = (currentPage - 1) * perPage;
            const pageData = filteredRooms.slice(start, start + perPage);

            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;">No matching rooms found.</td></tr>`;
                renderPagination();
                return;
            }

            pageData.forEach(room => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${room.username}</strong></td>
                    <td><span class="badge-live">● LIVE</span></td>
                    <td class="num"><span class="viewers-val">${room.viewers.toLocaleString()}</span></td>
                    <td>${room.country}</td>
                    <td><small>${room.tags}</small></td>
                    <td>${room.source}</td>
                    <td><a href="${room.url}" target="_blank">Open Room →</a></td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('total-count').textContent = allRooms.length;
            document.getElementById('seo-count').textContent = allRooms.length;
            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredRooms.length / perPage);
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = i === currentPage ? 'active' : '';
                btn.onclick = () => { currentPage = i; renderTable(); };
                pagination.appendChild(btn);
            }
        }

        function applyFilters() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            filteredRooms = allRooms.filter(room => 
                room.username.toLowerCase().includes(term) ||
                room.country.toLowerCase().includes(term) ||
                room.tags.toLowerCase().includes(term)
            );
            currentPage = 1;
            renderTable();
        }

        function sortTable(col) {
            if (sortColumn === col) sortDirection *= -1;
            else {
                sortColumn = col;
                sortDirection = (col === 2) ? -1 : 1;
            }

            filteredRooms.sort((a, b) => {
                let va = [a.username, 0, a.viewers, a.country, a.tags, a.source][col];
                let vb = [b.username, 0, b.viewers, b.country, b.tags, b.source][col];
                if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * sortDirection;
                return String(va).localeCompare(String(vb)) * sortDirection;
            });

            renderTable();
        }

        // Initialize
        window.onload = () => {
            fetchAllRooms();
            setInterval(fetchAllRooms, 4 * 60 * 1000); // Auto refresh every 4 minutes
        };
    </script>
</body>
</html>
