<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Live Asian, Pinay, Filipina & Thai Cams Directory">
    <title>Asian LIVE</title>
    <style>
        :root {
            --bg: #190b14;
            --bg2: #241422;
            --bg3: #331c2f;
            --border: #4e253b;
            --border2: #662e4b;
            --text: #eefbff;
            --text-muted: #d5617b;
            --text-dim: #bf3f5d;
            --accent: #e52b50;
            --accent2: #e66e88;
            --live: #e7829a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            line-height: 1.5;
            font-size: 14px;
        }
        a { color: #ea5170; text-decoration: none; }
        a:hover { color: #f7bfcb; }

        #navbar {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
            letter-spacing: -0.4px;
            text-shadow: 0 0 8px #e52b50;
        }
        .nav-links { display: flex; gap: 18px; flex: 1; }
        .nav-links a {
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .live-count {
            margin-left: auto;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
        }
        .live-count span { color: var(--live); font-weight: 600; }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 16px; }

        #seo-hero {
            padding: 20px 0 16px;
            border-bottom: 1px solid var(--border);
        }
        #seo-h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        #seo-tags {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        #seo-tags a {
            background: #2e192a;
            color: #f5aebd;
            border: 1px solid var(--border2);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.78rem;
        }
        #seo-tags a.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent2);
        }

        .controls-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }
        .controls-bar input {
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 4px;
            width: 280px;
        }
        .refresh-btn, .lbfm-btn {
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text-muted);
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .lbfm-btn {
            background: #4a1f3a;
            color: #ff99cc;
            font-weight: 600;
        }
        .refresh-btn:hover, .lbfm-btn:hover { 
            color: var(--accent); 
            border-color: var(--accent); 
        }

        .table-wrap { overflow-x: auto; margin-top: 10px; }
        #rooms-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        #rooms-table th {
            background: var(--bg2);
            padding: 11px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.73rem;
            letter-spacing: 0.6px;
            cursor: pointer;
        }
        #rooms-table th:hover { color: var(--accent); }
        #rooms-table th.sort-asc::after { content: " ▲"; color: var(--accent); }
        #rooms-table th.sort-desc::after { content: " ▼"; color: var(--accent); }

        #rooms-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }
        #rooms-table tr:hover { background: #392035; }

        .avatar {
            width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-right: 8px; vertical-align: middle;
        }
        .badge-live {
            background: rgba(231,130,154,0.14);
            color: var(--live);
            border: 1px solid rgba(231,130,154,0.4);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .viewers-val { color: var(--live); font-weight: 600; }

        #pagination {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        #pagination button {
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            min-width: 36px;
        }
        #pagination button.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent2);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div id="navbar">
        <span class="site-title">● ASIAN LIVE</span>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#directory">Directory</a>
        </nav>
        <a href="https://fhg.camdough.com/" target="_blank" class="lbfm-btn">LBFM Original Site</a>
        <span class="live-count">Online: <span id="total-count">—</span></span>
    </div>

    <div class="container">
        <div id="seo-hero">
            <h1 id="seo-h1">Asian, Pinay &amp; Filipina Live Cams — <span id="seo-count">0</span> Online Now</h1>
            <div id="seo-tags">
                <span class="seo-label">Tags:</span>
                <a href="#" class="active" onclick="filterByTag('pinay')">pinay</a>
                <a href="#" onclick="filterByTag('filipina')">Filipina</a>
                <a href="#" onclick="filterByTag('asian')">Asian</a>
                <a href="#" onclick="filterByTag('thai')">Thai</a>
            </div>
        </div>

        <div class="controls-bar">
            <input type="text" id="search-input" placeholder="Search username, country or tag..." onkeyup="applyFilters()">
            <button class="refresh-btn" id="refresh-btn" onclick="fetchAllRooms()">↻ Refresh Now</button>
        </div>

        <div class="table-wrap">
            <table id="rooms-table">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Username</th>
                        <th onclick="sortTable(1)">Status</th>
                        <th onclick="sortTable(2)" class="num">Viewers</th>
                        <th onclick="sortTable(3)">Country</th>
                        <th onclick="sortTable(4)">Tags</th>
                        <th onclick="sortTable(5)">Source</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="rooms-body"></tbody>
            </table>
        </div>

        <div id="pagination"></div>
    </div>

    <footer>
        <p>All models are 18+. Adult content only. Auto-refresh every 4 minutes.</p>
    </footer>

    <script>
        let allRooms = [];
        let filteredRooms = [];
        let currentPage = 1;
        const perPage = 50;
        let sortColumn = 2;   // Default: Viewers
        let sortDirection = -1; // desc

        const WM = "T2CSW";

        async function fetchAllRooms() {
            const tbody = document.getElementById('rooms-body');
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:60px;color:#d5617b;">Loading live Asian & Pinay rooms...</td></tr>`;

            const sources = [
                // Chaturbate - prioritized
                `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=120&tag=pinay&gender=f`,
                `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=80&tag=filipina&gender=f`,
                `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=100&tag=asian&gender=f`,
                `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM}&client_ip=request_ip&limit=60&tag=thai&gender=f`,
                // BongaCams as backup
                `https://bngprm.com/promo.php?c=18144&type=api&api_v=1&limit=30&api_type=json`
            ];

            let rooms = [];

            for (let url of sources) {
                try {
                    const res = await fetch(url);
                    const data = await res.json();

                    if (data.rooms) {
                        rooms = rooms.concat(data.rooms.map(r => ({
                            username: r.username || 'Unknown',
                            viewers: parseInt(r.num_users) || 0,
                            country: r.location || 'Asia',
                            tags: (r.tags || ['Asian']).join(', '),
                            source: 'Chaturbate',
                            url: `https://chaturbate.com/${r.username}/?tour=bbrB&campaign=${WM}`
                        })));
                    } else if (Array.isArray(data)) {
                        rooms = rooms.concat(data.map(r => ({
                            username: r.username || 'Unknown',
                            viewers: parseInt(r.viewers) || 0,
                            country: r.homecountry || 'Asia',
                            tags: 'Asian',
                            source: 'BongaCams',
                            url: r.chat_url || `https://bongacams.com/${r.username}`
                        })));
                    }
                } catch(e) {
                    console.log("Failed to fetch from:", url);
                }
            }

            allRooms = rooms;
            filteredRooms = [...allRooms];
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('rooms-body');
            tbody.innerHTML = '';

            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageData = filteredRooms.slice(start, end);

            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;">No matching rooms found.</td></tr>`;
                renderPagination();
                return;
            }

            pageData.forEach(room => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${room.username}</strong></td>
                    <td><span class="badge-live">● LIVE</span></td>
                    <td class="num"><span class="viewers-val">${room.viewers.toLocaleString()}</span></td>
                    <td>${room.country}</td>
                    <td><small>${room.tags}</small></td>
                    <td>${room.source}</td>
                    <td><a href="${room.url}" target="_blank">Open Room →</a></td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('total-count').textContent = allRooms.length;
            document.getElementById('seo-count').textContent = allRooms.length;

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredRooms.length / perPage);
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = (i === currentPage) ? 'active' : '';
                btn.onclick = () => { currentPage = i; renderTable(); };
                pagination.appendChild(btn);
            }
        }

        function applyFilters() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            filteredRooms = allRooms.filter(room => 
                room.username.toLowerCase().includes(term) ||
                room.country.toLowerCase().includes(term) ||
                room.tags.toLowerCase().includes(term)
            );
            currentPage = 1;
            renderTable();
        }

        function sortTable(colIndex) {
            if (sortColumn === colIndex) {
                sortDirection *= -1;
            } else {
                sortColumn = colIndex;
                sortDirection = (colIndex === 2) ? -1 : 1;
            }

            filteredRooms.sort((a, b) => {
                let valA, valB;
                switch(colIndex) {
                    case 0: valA = a.username; valB = b.username; break;
                    case 2: valA = a.viewers; valB = b.viewers; break;
                    case 3: valA = a.country; valB = b.country; break;
                    case 4: valA = a.tags; valB = b.tags; break;
                    case 5: valA = a.source; valB = b.source; break;
                    default: return 0;
                }
                if (typeof valA === 'number' && typeof valB === 'number') {
                    return (valA - valB) * sortDirection;
                }
                return String(valA).localeCompare(String(valB)) * sortDirection;
            });

            renderTable();
        }

        function filterByTag(tag) {
            document.querySelectorAll('#seo-tags a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('search-input').value = tag;
            applyFilters();
        }

        // Initialize
        window.onload = () => {
            fetchAllRooms();
            // Auto refresh every 4 minutes
            setInterval(fetchAllRooms, 4 * 60 * 1000);
        };
    </script>
</body>
</html>
