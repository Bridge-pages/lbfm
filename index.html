<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinay Live Models</title>
<style>
body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#0f0f0f; color:#e0e0e0; }
header { background:#1b1b1b; color:#fff; padding:20px; text-align:center; border-bottom:1px solid #333; }
.container { max-width:1100px; margin:20px auto; padding:0 10px; }
.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:16px; margin-top:16px; }
.post { background:#1c1c1c; border-radius:4px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.6); }
.post img { width:100%; display:block; aspect-ratio:3/2; object-fit:cover; }
.post-content { padding:12px; }
.post-title { font-size:15px; margin:0 0 5px; }
.post-title a { color:#ff5252; text-decoration:none; }
.post-meta { font-size:12px; color:#aaa; }
.status { text-align:center; padding:20px; }
.error { color:#ff5252; }
@media (max-width:600px){ .grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<header>
  <h1>Pinay &amp; Filipina Live Models</h1>
</header>
<div class="container">
  <div id="status" class="status">Loading...</div>
  <div id="posts" class="grid"></div>
</div>

<script>
const WM   = "T2CSW";
const TOUR = "z9Aq";

function revshareUrl(username) {
  return `https://chaturbate.com/in/?tour=${TOUR}&campaign=${WM}&track=default&room=${username}`;
}

function setStatus(msg, isError = false) {
  const el = document.getElementById("status");
  el.className = "status" + (isError ? " error" : "");
  el.innerHTML = msg;
}

function renderPosts(rooms) {
  const container = document.getElementById("posts");
  container.innerHTML = "";
  const seen = new Set();
  rooms
    .filter(r => { if (seen.has(r.username)) return false; seen.add(r.username); return true; })
    .forEach(r => {
      const link = revshareUrl(r.username);
      const el   = document.createElement("div");
      el.className = "post";
      el.innerHTML = `
        <a href="${link}" target="_blank" rel="noopener noreferrer">
          <img src="${r.image_url}" alt="${r.username}"
               onerror="this.src='https://placehold.co/600x400/1c1c1c/555?text=Offline'">
        </a>
        <div class="post-content">
          <h2 class="post-title"><a href="${link}" target="_blank" rel="noopener noreferrer">${r.username}</a></h2>
          <div class="post-meta">${r.current_show || "Live"} · 👁 ${r.num_users || 0}</div>
        </div>
      `;
      container.appendChild(el);
    });
}

async function loadRooms() {
  setStatus("Loading...");
  try {
    const res = await fetch(`rooms.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data  = await res.json();
    const rooms = data.results || [];

    if (rooms.length === 0) {
      setStatus("No Pinay or Filipina rooms online right now. Check back soon.");
      return;
    }

    setStatus(`${rooms.length} rooms live`);
    setTimeout(() => setStatus(""), 2000);
    renderPosts(rooms);
  } catch (e) {
    setStatus("Could not load rooms.json — check the Actions tab.", true);
  }
}

loadRooms();
setInterval(loadRooms, 5 * 60 * 1000);
</script>
</body>
</html>
